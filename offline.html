<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Compass Consult</title>
    <meta name="robots" content="noindex">
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --purple: #483086;
            --teal: #2da8b4;
            --border: rgba(72, 48, 134, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(45, 168, 180, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(72, 48, 134, 0.16), transparent 28%),
                var(--bg);
        }

        main {
            width: min(100%, 42rem);
            padding: 2.5rem;
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.05;
        }

        p {
            margin: 0 0 1rem;
            color: var(--muted);
            line-height: 1.65;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        a,
        button {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 0.9rem 1.25rem;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        a {
            background: var(--purple);
            color: #ffffff;
        }

        button {
            background: rgba(45, 168, 180, 0.1);
            color: var(--teal);
        }
    </style>
</head>
<body>
    <main>
        <p>Compass Consult</p>
        <h1>You are offline right now.</h1>
        <p>The page you requested is not available without a network connection. Once you are back online, you can reload this page or return to the homepage.</p>
        <div class="actions">
            <a href="/index.html">Go to homepage</a>
            <button type="button" onclick="window.location.reload()">Try again</button>
        </div>
    </main>
</body>
</html>
